<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <g fill="#1e293b">
    <!-- 8 teeth evenly spaced -->
    <rect x="228" y="28" width="56" height="100" rx="12"/>
    <rect x="228" y="28" width="56" height="100" rx="12" transform="rotate(45 256 256)"/>
    <rect x="228" y="28" width="56" height="100" rx="12" transform="rotate(90 256 256)"/>
    <rect x="228" y="28" width="56" height="100" rx="12" transform="rotate(135 256 256)"/>
    <rect x="228" y="28" width="56" height="100" rx="12" transform="rotate(180 256 256)"/>
    <rect x="228" y="28" width="56" height="100" rx="12" transform="rotate(225 256 256)"/>
    <rect x="228" y="28" width="56" height="100" rx="12" transform="rotate(270 256 256)"/>
    <rect x="228" y="28" width="56" height="100" rx="12" transform="rotate(315 256 256)"/>
    <!-- Central solid body -->
    <circle cx="256" cy="256" r="140"/>
  </g>
  <!-- Inner hole -->
  <circle cx="256" cy="256" r="55" fill="#ffffff"/>
  <!-- Inner hub accent ring -->
  <circle cx="256" cy="256" r="75" fill="none" stroke="#1e293b" stroke-width="4"/>
  <!-- Small center dot -->
  <circle cx="256" cy="256" r="10" fill="#1e293b"/>
</svg>
